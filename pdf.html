<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF Review | Creative + Marketing Site Reviewer | iDesign</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap');
  :root{--bg:#001E2E;--surf:#002B40;--surf2:#0A3A52;--field:#00263A;--line:rgba(137,242,247,.16);--primary:#017FAE;--primary2:#00A5E1;--green:#6FEEAC;--text:#E9F3F7;--muted:#7FA6B8}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Lato',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:var(--bg)}
  header{background:linear-gradient(135deg,#00263A,#013A52);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line)}
  header .dot{width:14px;height:14px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 3px rgba(1,127,174,.28)}
  header h1{font-size:15px;margin:0;font-weight:900}
  header .who{margin-left:auto;font-size:12px;color:var(--muted);display:flex;gap:10px;align-items:center}
  .link{background:none;border:none;color:var(--primary2);cursor:pointer;font-size:12px;font-weight:700}
  .layout{display:flex;height:calc(100vh - 45px);min-height:480px}
  .stage{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
  .bar{display:flex;gap:10px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .btn{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:13.5px;cursor:pointer}
  .btn:hover{background:var(--primary2)}
  .btn.on{background:transparent;border:1.5px solid var(--line);color:var(--muted)}
  .pages{flex:1;overflow:auto;padding:20px;display:flex;flex-direction:column;align-items:center;gap:18px;background:#00141f}
  .pdf-page{position:relative;box-shadow:0 6px 24px rgba(0,0,0,.5);border-radius:4px;overflow:hidden}
  .pdf-page canvas{display:block}
  .pdf-page.commenting{cursor:crosshair}
  .players{position:absolute;inset:0;pointer-events:none}
  .pin{position:absolute;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50% 50% 50% 3px;background:var(--primary);color:#fff;border:2px solid #E9F3F7;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;box-shadow:0 2px 8px rgba(0,0,0,.5)}
  .pin.done{background:var(--green);color:#002B40;border-color:#002B40}
  .side{width:340px;flex:none;border-left:1px solid var(--line);background:var(--surf);display:flex;flex-direction:column}
  .side-h{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:900;font-size:14px;display:flex;justify-content:space-between}
  .list{flex:1;overflow:auto;padding:8px 10px}
  .empty{color:var(--muted);text-align:center;padding:28px 10px;font-size:13px;line-height:1.5}
  .cmt{padding:10px;border-radius:12px;cursor:pointer;margin-bottom:6px}
  .cmt:hover{background:var(--surf2)}
  .cmt.done{opacity:.55}
  .cmt.flash{animation:flash 2.2s ease-out}
  @keyframes flash{0%,40%{background:rgba(0,165,225,.28);box-shadow:0 0 0 2px var(--primary2)}100%{background:transparent;box-shadow:none}}
  .cmt-top{display:flex;justify-content:space-between;gap:8px;align-items:center}
  .badge{background:var(--primary);color:#fff;font-weight:700;font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none}
  .cmt.done .badge{background:var(--green);color:#002B40}
  .pgtag{font-size:11px;color:var(--muted);font-weight:700}
  .who-n{font-size:12px;font-weight:700;margin-top:3px}
  .ago{font-size:11px;color:var(--muted)}
  .cmt-body{font-size:13.5px;color:#CCE5EF;margin-top:3px;line-height:1.4;white-space:pre-wrap}
  .cmt-actions{margin-top:6px;display:flex;gap:10px}
  .foot{padding:9px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
  .pop{position:fixed;width:300px;background:var(--surf);border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 44px rgba(0,8,16,.6);padding:12px;z-index:40;display:none}
  .pop.show{display:block}
  textarea{width:100%;min-height:64px;background:var(--field);border:1px solid var(--line);border-radius:10px;padding:9px;color:var(--text);font-size:13px;font-family:inherit;resize:vertical}
  textarea:focus{outline:none;border-color:var(--primary)}
  input{width:100%;background:var(--field);border:1px solid var(--line);border-radius:10px;padding:10px;color:var(--text);font-size:14px;font-family:inherit}
  input::placeholder,textarea::placeholder{color:#5C7E90}
  .pop-a{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}
  .scrim{position:fixed;inset:0;background:rgba(0,18,28,.82);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .scrim.show{display:flex}
  .gate{width:380px;max-width:calc(100vw - 40px);background:var(--surf);border:1px solid var(--line);border-radius:18px;padding:26px 24px;box-shadow:0 30px 80px rgba(0,8,16,.7)}
  .gate h2{font-size:19px;margin:0 0 6px;color:#fff}.gate p{font-size:13px;color:var(--muted);margin:0 0 12px;line-height:1.5}
  .gate input{margin-bottom:10px}.gate .btn{width:100%}
  @media(max-width:820px){ .layout{flex-direction:column;height:auto} .side{width:100%;border-left:0;border-top:1px solid var(--line)} }
</style>
</head>
<body>
<header>
  <span class="dot"></span><h1 id="title">PDF Review</h1>
  <span class="who"><span id="whoName">—</span><button class="link" onclick="askIdentity()">change</button></span>
</header>
<div class="layout">
  <div class="stage">
    <div class="bar">
      <button class="btn" id="addBtn" onclick="toggleMode()">+ Add comment</button>
      <span id="hint" style="color:var(--muted);font-size:13px">Click <b>+ Add comment</b>, then click the spot on the page.</span>
    </div>
    <div class="pages" id="pages"><div class="empty" style="margin:auto">Loading PDF…</div></div>
  </div>
  <div class="side">
    <div class="side-h"><span>Comments</span><span id="count" class="ago"></span></div>
    <div class="list" id="list"><div class="empty">Loading…</div></div>
    <div class="foot"><span>● shared</span><button class="link" onclick="load()">refresh</button></div>
  </div>
</div>
<div class="pop" id="pop">
  <div class="pgtag" id="popPg" style="margin-bottom:6px"></div>
  <textarea id="ta" placeholder="What needs to change here?"></textarea>
  <div class="pop-a"><button class="btn on" onclick="closePop()">Cancel</button><button class="btn" onclick="postComment()">Post</button></div>
</div>
<div class="scrim" id="scrim">
  <div class="gate">
    <h2>Sign in to review</h2><p>So the team knows who left each comment. Then click a spot on any page to leave a note.</p>
    <input id="gName" type="text" placeholder="Your name"><input id="gEmail" type="email" placeholder="you@idesignedu.org">
    <button class="btn" onclick="saveIdentity()">Start reviewing</button>
    <div id="gErr" style="color:#FF8A7A;font-size:12.5px;margin-top:6px"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
var SUPA_URL='https://puytjdeavhowngzqdymh.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXRqZGVhdmhvd25nenFkeW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MjYyMzEsImV4cCI6MjA5OTEwMjIzMX0.CqC7Sh6d6dNr6hCiT9tpgKPKWsVJpQhsbaJyAYN-kZY';
var PROXY='https://funny-eagle-3488.idesign-creative.deno.net/';   // used to fetch the PDF with CORS
var H={apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
var params=new URLSearchParams(location.search);
var SRC=params.get('v')||''; var NAME=params.get('name')||'';
var FOCUS=params.get('focus')||'';   // dashboard deep-link: jump to & highlight this comment
var PROJECT=SRC, PAGE='pdf';
var DATA=[], MODE=false, pending=null, pageEls={};
if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
function ago(iso){var s=Math.max(1,(Date.now()-new Date(iso))/1000);if(s<60)return'just now';var m=s/60;if(m<60)return Math.floor(m)+'m ago';var h=m/60;if(h<24)return Math.floor(h)+'h ago';return Math.floor(h/24)+'d ago';}
function getName(){return localStorage.getItem('idr_name')||'';}
function getEmail(){return localStorage.getItem('idr_email')||'';}
function author(){var n=getName(),e=getEmail();return n?(e?n+' ('+e+')':n):e;}
function updateWho(){ $('whoName').textContent=author()||'not signed in'; }

function toggleMode(){ MODE=!MODE; $('addBtn').textContent=MODE?'✕ Cancel (click a page)':'+ Add comment'; $('addBtn').classList.toggle('on',MODE); document.querySelectorAll('.pdf-page').forEach(function(p){p.classList.toggle('commenting',MODE);}); }

// Pull a Drive/Docs file id out of any of the link shapes people paste.
function driveId(u){
  var m=u.match(/\/file\/d\/([-\w]{20,})/)||u.match(/\/d\/([-\w]{20,})/)||u.match(/[?&]id=([-\w]{20,})/);
  return m?m[1]:'';
}
// Turn a Google Drive/Docs share link into a direct-bytes URL PDF.js can read
// (streamed through the proxy for CORS). Requires the file be shared
// "Anyone with the link can view." Non-Drive links pass through untouched.
function toFetchUrl(src){
  var id=driveId(src);
  if(/docs\.google\.com\/(document|presentation|spreadsheets)\//.test(src)&&id){
    if(/\/spreadsheets\//.test(src)) return 'https://docs.google.com/spreadsheets/d/'+id+'/export?format=pdf';
    if(/\/presentation\//.test(src)) return 'https://docs.google.com/presentation/d/'+id+'/export/pdf';
    return 'https://docs.google.com/document/d/'+id+'/export?format=pdf';
  }
  if(/drive\.(google|usercontent\.google)\.com/.test(src)&&id){
    return 'https://drive.usercontent.google.com/download?id='+id+'&export=download&confirm=t';
  }
  return src; // already a direct .pdf link
}
async function renderPdf(){
  try{
    var task=pdfjsLib.getDocument(PROXY+'?url='+encodeURIComponent(toFetchUrl(SRC)));
    var pdf=await task.promise;
    $('pages').innerHTML='';
    var cw=$('pages').clientWidth-40;
    for(var p=1;p<=pdf.numPages;p++){
      var page=await pdf.getPage(p);
      var v1=page.getViewport({scale:1});
      var scale=Math.min(1.6,(Math.min(cw,900))/v1.width);
      var vp=page.getViewport({scale:scale});
      var wrap=document.createElement('div'); wrap.className='pdf-page'+(MODE?' commenting':''); wrap.style.width=vp.width+'px'; wrap.dataset.pg=p;
      var cv=document.createElement('canvas'); cv.width=vp.width; cv.height=vp.height;
      var ov=document.createElement('div'); ov.className='players';
      wrap.appendChild(cv); wrap.appendChild(ov); $('pages').appendChild(wrap);
      pageEls[p]={wrap:wrap,ov:ov,w:vp.width,h:vp.height};
      await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    }
    renderPins();
  }catch(err){ $('pages').innerHTML='<div class="empty" style="margin:auto">Could not load the PDF.<br>For a Google Drive file, set it to <b>“Anyone with the link · Viewer”</b> and paste the normal share link.<br>Direct <b>.pdf</b> links also work.<br><span style="font-size:11px">'+esc(String(err))+'</span></div>'; }
}
function renderPins(){
  Object.keys(pageEls).forEach(function(p){ pageEls[p].ov.innerHTML=''; });
  var parents=DATA.filter(function(c){return !c.parent_id;});
  parents.forEach(function(c,i){
    var a=c.anchor||{}; var pe=pageEls[a.pg]; if(!pe) return;
    var pin=document.createElement('button'); pin.className='pin'+(c.resolved?' done':''); pin.textContent=c.resolved?'✓':(i+1); pin.title=c.author+': '+c.body;
    pin.style.left=(a.x*pe.w)+'px'; pin.style.top=(a.y*pe.h)+'px';
    pin.onclick=function(ev){ ev.stopPropagation(); openThread(c,i+1); };
    pe.ov.appendChild(pin);
  });
}
function postComment(){
  var body=$('ta').value.trim(); if(!body||!pending){ $('ta').focus(); return; }
  var c={project:PROJECT,page:PAGE,author:author(),body:body,anchor:{type:'pdf',pg:pending.pg,x:pending.x,y:pending.y,tx:'p.'+pending.pg},parent_id:null,resolved:false};
  fetch(SUPA_URL+'/rest/v1/review_comments',{method:'POST',headers:Object.assign({Prefer:'return=minimal'},H),body:JSON.stringify([c])})
    .then(function(r){ if(!r.ok)throw new Error(r.status); closePop(); if(MODE) toggleMode(); load(); })
    .catch(function(e){ alert('Could not post ('+e.message+').'); });
}
function closePop(){ $('pop').classList.remove('show'); pending=null; }
function openThread(c,n){
  var msg=c.author+' — '+ago(c.created_at)+'\n\n'+c.body+'\n\n(Page '+(c.anchor&&c.anchor.pg)+')';
  var act=prompt(msg+'\n\n— Type "r" to resolve/reopen, "d" to delete (your own), or Cancel.','');
  if(act===null) return;
  if(act.toLowerCase()==='r') fetch(SUPA_URL+'/rest/v1/review_comments?id=eq.'+c.id,{method:'PATCH',headers:H,body:JSON.stringify({resolved:!c.resolved})}).then(load);
  else if(act.toLowerCase()==='d' && c.author===author()){ fetch(SUPA_URL+'/rest/v1/review_comments?id=eq.'+c.id,{method:'DELETE',headers:H}).then(load); }
}
function load(){
  fetch(SUPA_URL+'/rest/v1/review_comments?project=eq.'+encodeURIComponent(PROJECT)+'&select=*&order=created_at.asc',{headers:H})
    .then(function(r){return r.ok?r.json():[];})
    .then(function(rows){ DATA=rows||[]; renderList(); renderPins(); maybeFocus(); })
    .catch(function(){ $('list').innerHTML='<div class="empty">Could not load comments.</div>'; });
}
function maybeFocus(){
  if(!FOCUS) return;
  var c=DATA.filter(function(x){return String(x.id)===String(FOCUS);})[0]; if(!c) return;
  var top=c.parent_id?(DATA.filter(function(x){return String(x.id)===String(c.parent_id);})[0]||c):c;
  FOCUS='';                                  // one-shot
  var pg=(top.anchor&&top.anchor.pg)||1;
  var go=function(){ scrollToPage(pg); };
  go(); setTimeout(go,700);                   // retry once pages have rendered
  var node=document.getElementById('c-'+top.id);
  if(node){ node.classList.add('flash'); }
}
function renderList(){
  var parents=DATA.filter(function(c){return !c.parent_id;});
  parents.sort(function(a,b){ var pa=(a.anchor&&a.anchor.pg||0),pb=(b.anchor&&b.anchor.pg||0); return pa-pb || (a.anchor&&a.anchor.y||0)-(b.anchor&&b.anchor.y||0); });
  $('count').textContent=parents.length+' comment'+(parents.length===1?'':'s');
  if(!parents.length){ $('list').innerHTML='<div class="empty">No comments yet. Click <b>+ Add comment</b>, then click a spot on a page.</div>'; return; }
  $('list').innerHTML=parents.map(function(c,i){ var a=c.anchor||{}; var mine=c.author===author();
    return '<div class="cmt'+(c.resolved?' done':'')+'" id="c-'+c.id+'" onclick="scrollToPage('+(a.pg||1)+')">'
      +'<div class="cmt-top"><span class="badge">'+(c.resolved?'✓':(i+1))+'</span><span class="pgtag">Page '+(a.pg||'?')+'</span><span class="ago">'+ago(c.created_at)+'</span></div>'
      +'<div class="who-n">'+esc(c.author)+'</div><div class="cmt-body">'+esc(c.body)+'</div>'
      +'<div class="cmt-actions" onclick="event.stopPropagation()">'
        +'<button class="link" onclick="tog(\''+c.id+'\','+(c.resolved?'false':'true')+')">'+(c.resolved?'reopen':'resolve')+'</button>'
        +(mine?'<button class="link" onclick="delc(\''+c.id+'\')">delete</button>':'')+'</div></div>';
  }).join('');
}
function tog(id,v){ fetch(SUPA_URL+'/rest/v1/review_comments?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify({resolved:v})}).then(load); }
function delc(id){ if(!confirm('Delete this comment?'))return; fetch(SUPA_URL+'/rest/v1/review_comments?id=eq.'+id,{method:'DELETE',headers:H}).then(load); }
function scrollToPage(p){ if(pageEls[p]) pageEls[p].wrap.scrollIntoView({behavior:'smooth',block:'center'}); }
function askIdentity(){ $('gName').value=getName(); $('gEmail').value=getEmail(); $('scrim').classList.add('show'); setTimeout(function(){$('gName').focus();},30); }
function saveIdentity(){ var n=$('gName').value.trim(),e=$('gEmail').value.trim(); if(!n){$('gErr').textContent='Enter your name.';return;} if(!/.+@.+\..+/.test(e)){$('gErr').textContent='Enter a valid email.';return;} localStorage.setItem('idr_name',n); localStorage.setItem('idr_email',e); $('scrim').classList.remove('show'); updateWho(); }

if(NAME){ $('title').textContent=NAME+' — PDF Review'; document.title=NAME+' | PDF Review'; }
updateWho();
if(!getEmail()) askIdentity();
// one delegated click listener on the pages container (robust across re-renders)
$('pages').addEventListener('click', function(e){
  if(!MODE) return;
  var wrap = e.target && e.target.closest ? e.target.closest('.pdf-page') : null;
  if(!wrap) return;
  if(!getEmail()){ askIdentity(); return; }
  var pg=+wrap.dataset.pg; var rect=wrap.getBoundingClientRect();
  pending={pg:pg, x:(e.clientX-rect.left)/rect.width, y:(e.clientY-rect.top)/rect.height};
  $('popPg').textContent='Page '+pg;
  var pop=$('pop'); pop.classList.add('show');
  pop.style.left=Math.min(window.innerWidth-320,e.clientX+8)+'px'; pop.style.top=Math.min(window.innerHeight-200,e.clientY+8)+'px';
  $('ta').value=''; $('ta').focus();
});
if(SRC && window.pdfjsLib) renderPdf(); else $('pages').innerHTML='<div class="empty" style="margin:auto">No PDF specified.</div>';
load();
setInterval(load,6000);
window.addEventListener('resize',function(){ /* keep pins aligned */ renderPins(); });
</script>
</body>
</html>
