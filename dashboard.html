<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Studio Review — All Feedback</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap');
  :root{--bg:#00202D;--surf:#002E40;--surf2:#123E4E;--field:#00293A;--line:#20505F;--primary:#33C9FF;--primary2:#5CD4FF;--green:#81C784;--text:#E9F3F7;--muted:#8FA8B4}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Lato',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:var(--bg)}
  header{background:linear-gradient(135deg,#00263A,#013A52);color:#fff;padding:18px 28px;display:flex;flex-direction:column;align-items:stretch;gap:10px;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line)}
  header .dot{width:14px;height:14px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 3px rgba(1,127,174,.28)}
  header h1{font-size:17px;margin:0;font-weight:900}
  header .pill{background:rgba(137,242,247,.14);border-radius:20px;padding:3px 10px;font-size:12px;color:#CCE5EF}
  .wrap{max-width:1000px;margin:0 auto;padding:20px 20px 80px}
  .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:12px 0}
  .tab{border:none;background:rgba(137,242,247,.08);color:var(--muted);border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
  .tab.on{background:#D6F4FF;color:#002E40}
  .btn{background:rgba(137,242,247,.08);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:8px 14px;font-weight:700;font-size:12.5px;cursor:pointer}
  .btn:hover{background:var(--surf2)}
  .btn.red{background:var(--primary);color:#00202D;border-color:transparent}
  .btn.red:hover{background:var(--primary2)}
  select{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12.5px;font-weight:700;color:var(--text);background:var(--field);font-family:inherit}
  .spacer{flex:1}
  .kpis{display:flex;gap:12px;flex-wrap:wrap;margin:4px 0 8px}
  .kpi{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:12px 18px;min-width:104px}
  .kpi .n{font-size:26px;font-weight:900;color:#fff}
  .kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .sitecard{background:linear-gradient(90deg,rgba(1,80,110,.95) 0%,rgba(0,51,70,.95) 100%);border:1px solid #4DA5C6;border-radius:0 16px 0 16px;box-shadow:0 4px 16px rgba(0,18,26,.25);margin:20px 0;overflow:hidden}
  .siteh{font-weight:900;font-size:15px;color:#fff;padding:15px 20px 13px}
  .grp{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:10px 20px 2px;border-top:1px solid rgba(137,242,247,.12)}
  .grp .c{font-weight:600;color:#5C7E90}
  .crow{display:flex;gap:12px;padding:13px 20px;border-top:1px solid rgba(137,242,247,.10);cursor:pointer;position:relative;transition:background .12s}
  .grp + .crow{border-top:none}
  .crow:hover,.crow:focus-visible{background:rgba(137,242,247,.055);outline:none}
  .crow:hover .open,.crow:focus-visible .open{opacity:1}
  .open{display:inline-block;margin-top:6px;font-size:11px;font-weight:700;color:var(--primary2);opacity:.55;transition:opacity .12s}
  .crow.done{opacity:.55}
  .badge{flex:none;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#00202D;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .badge.done{background:var(--green);color:#002B40}
  .body{flex:1}
  .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .who{font-size:12.5px;font-weight:700;color:var(--text)}
  .when{font-size:11.5px;color:var(--muted)}
  .topright{display:flex;align-items:center;gap:8px}
  .tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 9px;border-radius:20px}
  .tag.open{background:#EBFAFF;color:#002E40}
  .tag.res{background:#C8E6C9;color:#18551D}
  .txt{font-size:14px;color:#CCE5EF;margin:3px 0;line-height:1.4}
  .where{font-size:11.5px;color:var(--muted);font-style:italic}
  .reply{margin-top:6px;padding-left:10px;border-left:2px solid var(--line);font-size:13px;color:var(--muted)}
  .reply b{color:var(--text)}
  .muted{color:var(--muted);text-align:center;padding:40px 10px}
  .err{color:#FF8A7A}
  .htop{display:flex;align-items:center;gap:12px}
  .topnav{display:flex;gap:24px}
  .topnav a{font-size:14px;font-weight:700;color:#8FA8B4;text-decoration:none;padding:4px 1px 3px;border-bottom:2px solid transparent}
  .topnav a:hover{color:#fff}
  .topnav a.on{color:#fff;border-bottom-color:var(--primary)}
  #scope{margin:14px 0 2px;font-size:15px;font-weight:900;color:#fff;display:none}
  #scope.show{display:block}
  #scope .k{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--primary2);display:block;margin-bottom:2px}
  #scope a{color:var(--muted);font-size:12px;font-weight:700;text-decoration:none;margin-left:10px}
  #scope a:hover{color:var(--text)}
/* Studio design-system component signatures */
  .btn,.btn.sm,.btn.on,.btn.ghost,.btn.red,.btn.danger{border-radius:24px}
  .card,.newform{border-radius:0 16px 0 16px;border-color:#4DA5C6}
  .card{background:linear-gradient(90deg,rgba(1,80,110,.95) 0%,rgba(0,51,70,.95) 100%);box-shadow:0 4px 16px rgba(0,18,26,.25)}
  input,textarea,select{border-radius:10px}
</style>
</head>
<body>
<header>
  <div class="htop">
    <img src="studio-review-logo.svg" alt="Studio Review" style="height:22px;display:block">
    <span style="flex:1"></span>
    <span class="pill" id="live">Live</span>
  </div>
  <nav class="topnav"><a href="./library.html">Library</a><a href="./hub.html">Hub</a><a class="on" href="./dashboard.html">Dashboard</a></nav>
</header>
<div class="wrap">
  <p style="color:var(--muted);font-size:14px;margin:16px 0 4px">Every comment your reviewers leave, across all items. Use <b>Collections</b> or the item dropdown to narrow it down, then <b>Export CSV</b> to share.</p>
  <div id="scope"></div>
  <div class="kpis" id="kpis"></div>
  <div class="bar">
    <select id="collSel" onchange="COLLECTION=this.value;SITE='';computeCollScope();syncSiteSelector();render()"></select>
    <select id="siteSel" onchange="SITE=this.value;render()"></select>
    <button class="tab on" data-f="open" onclick="setF('open')">Open</button>
    <button class="tab" data-f="all" onclick="setF('all')">All</button>
    <button class="tab" data-f="resolved" onclick="setF('resolved')">Resolved</button>
    <span class="spacer"></span>
    <button class="btn" onclick="load()">Refresh</button>
    <button class="btn red" onclick="exportCsv()">Export CSV</button>
  </div>
  <div id="board"><div class="muted">Loading…</div></div>
</div>

<script>
var CFG = {
  url: 'https://puytjdeavhowngzqdymh.supabase.co',
  key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXRqZGVhdmhvd25nenFkeW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MjYyMzEsImV4cCI6MjA5OTEwMjIzMX0.CqC7Sh6d6dNr6hCiT9tpgKPKWsVJpQhsbaJyAYN-kZY'
};
var DATA=[], FILTER='open', SITE='';   // SITE '' = all sites
var COLLECTIONS=[], MEMBERS=[], REVIEWS=[], COLLECTION='', COLLNAME='', COLLPROJECTS=null; // COLLECTION '' = all
var PROXY='https://funny-eagle-3488.idesign-creative.deno.net/';
function $(id){return document.getElementById(id);}
// A collection scopes the board to the projects (reviews) it contains.
function computeCollScope(){
  if(!COLLECTION){ COLLPROJECTS=null; COLLNAME=''; return; }
  var revIds={}; MEMBERS.forEach(function(m){ if(m.collection_id===COLLECTION) revIds[m.review_id]=1; });
  var projs={}; REVIEWS.forEach(function(r){ if(revIds[r.id]) projs[r.project]=1; });
  COLLPROJECTS=projs;
  var cc=COLLECTIONS.filter(function(x){return x.id===COLLECTION;})[0]; COLLNAME=cc?cc.name:'';
}
function inScope(c){ if(COLLPROJECTS && !COLLPROJECTS[c.project]) return false; if(SITE && c.project!==SITE) return false; return true; }
// Build the reviewer URL that lands on the exact spot a comment refers to.
// Video/PDF reviews are their own pages; everything else goes through the proxy.
// ?focus=<id> tells the reviewer to scroll to and open that comment on load.
function openReview(id){
  var c=DATA.filter(function(x){return String(x.id)===String(id);})[0]; if(!c) return;
  var url;
  if(c.page==='video')      url='./video.html?v='+encodeURIComponent(c.project)+'&focus='+encodeURIComponent(c.id);
  else if(c.page==='pdf')   url='./pdf.html?v='+encodeURIComponent(c.project)+'&focus='+encodeURIComponent(c.id);
  else if(c.page==='decision') url='./decision.html?v='+encodeURIComponent(c.project);
  else {
    var target=/^https?:\/\//.test(c.project)?c.project:('https://'+c.project);
    target=target.replace(/\/+$/,'')+(c.page||'/');
    url=PROXY+'?url='+encodeURIComponent(target)+'&focus='+encodeURIComponent(c.id);
  }
  window.open(url,'_blank','noopener');
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
function ago(iso){var s=Math.max(1,(Date.now()-new Date(iso))/1000);if(s<60)return'just now';var m=s/60;if(m<60)return Math.floor(m)+'m ago';var h=m/60;if(h<24)return Math.floor(h)+'h ago';return Math.floor(h/24)+'d ago';}
function setF(f){FILTER=f;[].forEach.call(document.querySelectorAll('.tab'),function(t){t.classList.toggle('on',t.dataset.f===f);});render();}
function load(){
  var H={apikey:CFG.key,Authorization:'Bearer '+CFG.key};
  Promise.all([
    fetch(CFG.url+'/rest/v1/review_comments?select=*&order=created_at.asc',{headers:H}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}),
    fetch(CFG.url+'/rest/v1/collections?select=*&order=created_at.desc',{headers:H}).then(function(r){return r.ok?r.json():[];}),
    fetch(CFG.url+'/rest/v1/collection_items?select=*',{headers:H}).then(function(r){return r.ok?r.json():[];}),
    fetch(CFG.url+'/rest/v1/reviews?select=id,project',{headers:H}).then(function(r){return r.ok?r.json():[];})
  ]).then(function(res){ DATA=res[0]; COLLECTIONS=res[1]||[]; MEMBERS=res[2]||[]; REVIEWS=res[3]||[]; computeCollScope(); syncCollSelector(); syncSiteSelector(); render(); })
   .catch(function(e){$('board').innerHTML='<div class="muted err">Could not load ('+e.message+').</div>';});
}
function sites(){var s={};DATA.forEach(function(c){ if(COLLPROJECTS && !COLLPROJECTS[c.project]) return; s[c.project]=1;});return Object.keys(s).sort();}
function syncSiteSelector(){
  var cur=SITE, opts='<option value="">'+(COLLECTION?'All items in collection':'All sites')+'</option>';
  sites().forEach(function(p){opts+='<option value="'+esc(p)+'"'+(p===cur?' selected':'')+'>'+esc(p)+'</option>';});
  $('siteSel').innerHTML=opts;
}
function syncCollSelector(){
  var opts='<option value="">All collections</option>';
  COLLECTIONS.forEach(function(c){opts+='<option value="'+esc(c.id)+'"'+(c.id===COLLECTION?' selected':'')+'>'+esc(c.name)+'</option>';});
  $('collSel').innerHTML=opts;
  $('collSel').style.display=COLLECTIONS.length?'':'none';
}
function render(){
  var sc=$('scope');
  if(COLLECTION){ sc.className='show'; sc.innerHTML='<span class="k">Collection</span>'+esc(COLLNAME||'—')+'<a href="./dashboard.html">clear</a>'; }
  else { sc.className=''; sc.innerHTML=''; }
  var parents=DATA.filter(function(c){return !c.parent_id && inScope(c);});
  var open=parents.filter(function(c){return !c.resolved;}).length;
  var res=parents.length-open;
  var people=Object.keys(parents.reduce(function(a,c){a[c.author]=1;return a;},{})).length;
  var nSites=SITE?1:sites().length;
  $('kpis').innerHTML=kpi(parents.length,'comments')+kpi(open,'open')+kpi(res,'resolved')+kpi(people,'reviewers')+(SITE?'':kpi(nSites,COLLECTION?'items':'sites'));
  var shown=parents.filter(function(c){return FILTER==='all'?true:FILTER==='open'?!c.resolved:c.resolved;});
  if(!shown.length){$('board').innerHTML='<div class="muted">No '+FILTER+' comments'+(SITE?' for this item':(COLLECTION?' in this collection':''))+' yet.</div>';return;}
  // group by site -> page
  var bySite={};shown.forEach(function(c){(bySite[c.project]=bySite[c.project]||[]).push(c);});
  var html='';
  Object.keys(bySite).sort().forEach(function(site){
    html+='<div class="sitecard"><div class="siteh">'+esc(site)+'</div>';
    var byPage={};bySite[site].forEach(function(c){(byPage[c.page]=byPage[c.page]||[]).push(c);});
    Object.keys(byPage).sort().forEach(function(pg){
      html+='<div class="grp">'+esc(pg)+' <span class="c">· '+byPage[pg].length+'</span></div>';
      byPage[pg].forEach(function(c,i){
        var reps=DATA.filter(function(r){return r.parent_id===c.id;});
        var repHtml=reps.map(function(r){return '<div class="reply"><b>'+esc(r.author)+':</b> '+esc(r.body)+'</div>';}).join('');
        html+='<div class="crow '+(c.resolved?'done':'')+'" role="link" tabindex="0" title="Open in reviewer" onclick="openReview(\''+esc(c.id)+'\')" onkeydown="if(event.key===\'Enter\'){openReview(\''+esc(c.id)+'\')}">'
          +'<span class="badge '+(c.resolved?'done':'')+'">'+(c.resolved?'✓':(i+1))+'</span>'
          +'<div class="body"><div class="top"><span class="who">'+esc(c.author)+'</span><span class="topright"><span class="tag '+(c.resolved?'res':'open')+'">'+(c.resolved?'Resolved':'Open')+'</span><span class="when">'+ago(c.created_at)+'</span></span></div>'
          +'<div class="txt">'+esc(c.body)+'</div>'
          +(c.anchor&&c.anchor.tx?'<div class="where">on: “'+esc(c.anchor.tx.slice(0,80))+'”</div>':'')
          +repHtml
          +'<span class="open">Open in reviewer ↗</span>'
          +'</div></div>';
      });
    });
    html+='</div>';
  });
  $('board').innerHTML=html;
}
function kpi(n,l){return '<div class="kpi"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
function exportCsv(){
  var rows=[['site','page','status','comment','element_text','author','created_at','type']];
  DATA.filter(inScope).forEach(function(c){rows.push([c.project,c.page,c.resolved?'resolved':'open',c.body,(c.anchor&&c.anchor.tx)||'',c.author,c.created_at,c.parent_id?'reply':'comment']);});
  if(rows.length<2){alert('Nothing to export yet.');return;}
  var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var slug=(COLLNAME||'all').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='idesign-review-'+slug+'.csv';a.click();
}
var _q=new URLSearchParams(location.search);
if(_q.get('site')) SITE=_q.get('site');
if(_q.get('collection')) COLLECTION=_q.get('collection');
load();
setInterval(load, 15000);
</script>
</body>
</html>
