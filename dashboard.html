<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iDesign Site Review — All Feedback</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap');
  :root{--bg:#001E2E;--surf:#002B40;--surf2:#0A3A52;--field:#00263A;--line:rgba(137,242,247,.16);--primary:#017FAE;--primary2:#00A5E1;--green:#6FEEAC;--text:#E9F3F7;--muted:#7FA6B8}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Lato',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:var(--bg)}
  header{background:linear-gradient(135deg,#00263A,#013A52);color:#fff;padding:18px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line)}
  header .dot{width:14px;height:14px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 3px rgba(1,127,174,.28)}
  header h1{font-size:17px;margin:0;font-weight:900}
  header .pill{background:rgba(137,242,247,.14);border-radius:20px;padding:3px 10px;font-size:12px;color:#CCE5EF}
  .wrap{max-width:1000px;margin:0 auto;padding:20px 20px 80px}
  .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:12px 0}
  .tab{border:none;background:rgba(137,242,247,.08);color:var(--muted);border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
  .tab.on{background:var(--primary);color:#fff}
  .btn{background:rgba(137,242,247,.08);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:8px 14px;font-weight:700;font-size:12.5px;cursor:pointer}
  .btn:hover{background:var(--surf2)}
  .btn.red{background:var(--primary);color:#fff;border-color:transparent}
  .btn.red:hover{background:var(--primary2)}
  select{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12.5px;font-weight:700;color:var(--text);background:var(--field);font-family:inherit}
  .spacer{flex:1}
  .kpis{display:flex;gap:12px;flex-wrap:wrap;margin:4px 0 8px}
  .kpi{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:12px 18px;min-width:104px}
  .kpi .n{font-size:26px;font-weight:900;color:#fff}
  .kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .site{font-weight:900;font-size:15px;margin:22px 0 2px;padding:7px 12px;background:var(--surf);border:1px solid var(--line);border-radius:10px;display:inline-block;color:#fff}
  .grp{font-weight:700;font-size:13px;margin:12px 0 6px;color:var(--muted)}
  .grp .c{font-weight:600;color:#5C7E90;font-size:12px}
  .card{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;gap:12px}
  .card.done{opacity:.55}
  .badge{flex:none;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .badge.done{background:var(--green);color:#002B40}
  .body{flex:1}
  .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .who{font-size:12.5px;font-weight:700;color:var(--text)}
  .when{font-size:11.5px;color:var(--muted)}
  .topright{display:flex;align-items:center;gap:8px}
  .tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 9px;border-radius:20px}
  .tag.open{background:rgba(1,127,174,.24);color:#7FD3EE}
  .tag.res{background:rgba(111,238,172,.18);color:#6FEEAC}
  .txt{font-size:14px;color:#CCE5EF;margin:3px 0;line-height:1.4}
  .where{font-size:11.5px;color:var(--muted);font-style:italic}
  .reply{margin-top:6px;padding-left:10px;border-left:2px solid var(--line);font-size:13px;color:var(--muted)}
  .reply b{color:var(--text)}
  .muted{color:var(--muted);text-align:center;padding:40px 10px}
  .err{color:#FF8A7A}
</style>
</head>
<body>
<header>
  <span class="dot"></span><h1>iDesign Site Review — All Feedback</h1>
  <span class="pill" id="live">● live</span>
</header>
<div class="wrap">
  <div class="kpis" id="kpis"></div>
  <div class="bar">
    <select id="siteSel" onchange="SITE=this.value;render()"></select>
    <button class="tab on" data-f="open" onclick="setF('open')">Open</button>
    <button class="tab" data-f="all" onclick="setF('all')">All</button>
    <button class="tab" data-f="resolved" onclick="setF('resolved')">Resolved</button>
    <span class="spacer"></span>
    <button class="btn" onclick="load()">Refresh</button>
    <button class="btn red" onclick="exportCsv()">Export CSV</button>
  </div>
  <div id="board"><div class="muted">Loading…</div></div>
</div>

<script>
var CFG = {
  url: 'https://puytjdeavhowngzqdymh.supabase.co',
  key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXRqZGVhdmhvd25nenFkeW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MjYyMzEsImV4cCI6MjA5OTEwMjIzMX0.CqC7Sh6d6dNr6hCiT9tpgKPKWsVJpQhsbaJyAYN-kZY'
};
var DATA=[], FILTER='open', SITE='';   // SITE '' = all sites
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
function ago(iso){var s=Math.max(1,(Date.now()-new Date(iso))/1000);if(s<60)return'just now';var m=s/60;if(m<60)return Math.floor(m)+'m ago';var h=m/60;if(h<24)return Math.floor(h)+'h ago';return Math.floor(h/24)+'d ago';}
function setF(f){FILTER=f;[].forEach.call(document.querySelectorAll('.tab'),function(t){t.classList.toggle('on',t.dataset.f===f);});render();}
function load(){
  fetch(CFG.url+'/rest/v1/review_comments?select=*&order=created_at.asc',{headers:{apikey:CFG.key,Authorization:'Bearer '+CFG.key}})
   .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
   .then(function(rows){DATA=rows;syncSiteSelector();render();})
   .catch(function(e){$('board').innerHTML='<div class="muted err">Could not load ('+e.message+').</div>';});
}
function sites(){var s={};DATA.forEach(function(c){s[c.project]=1;});return Object.keys(s).sort();}
function syncSiteSelector(){
  var cur=SITE, opts='<option value="">All sites</option>';
  sites().forEach(function(p){opts+='<option value="'+esc(p)+'"'+(p===cur?' selected':'')+'>'+esc(p)+'</option>';});
  $('siteSel').innerHTML=opts;
}
function render(){
  var parents=DATA.filter(function(c){return !c.parent_id && (!SITE || c.project===SITE);});
  var open=parents.filter(function(c){return !c.resolved;}).length;
  var res=parents.length-open;
  var people=Object.keys(parents.reduce(function(a,c){a[c.author]=1;return a;},{})).length;
  var nSites=SITE?1:sites().length;
  $('kpis').innerHTML=kpi(parents.length,'comments')+kpi(open,'open')+kpi(res,'resolved')+kpi(people,'reviewers')+(SITE?'':kpi(nSites,'sites'));
  var shown=parents.filter(function(c){return FILTER==='all'?true:FILTER==='open'?!c.resolved:c.resolved;});
  if(!shown.length){$('board').innerHTML='<div class="muted">No '+FILTER+' comments'+(SITE?' for this site':'')+' yet.</div>';return;}
  // group by site -> page
  var bySite={};shown.forEach(function(c){(bySite[c.project]=bySite[c.project]||[]).push(c);});
  var html='';
  Object.keys(bySite).sort().forEach(function(site){
    html+='<div class="site">🌐 '+esc(site)+'</div>';
    var byPage={};bySite[site].forEach(function(c){(byPage[c.page]=byPage[c.page]||[]).push(c);});
    Object.keys(byPage).sort().forEach(function(pg){
      html+='<div class="grp">'+esc(pg)+' <span class="c">· '+byPage[pg].length+'</span></div>';
      byPage[pg].forEach(function(c,i){
        var reps=DATA.filter(function(r){return r.parent_id===c.id;});
        var repHtml=reps.map(function(r){return '<div class="reply"><b>'+esc(r.author)+':</b> '+esc(r.body)+'</div>';}).join('');
        html+='<div class="card '+(c.resolved?'done':'')+'">'
          +'<span class="badge '+(c.resolved?'done':'')+'">'+(c.resolved?'✓':(i+1))+'</span>'
          +'<div class="body"><div class="top"><span class="who">'+esc(c.author)+'</span><span class="topright"><span class="tag '+(c.resolved?'res':'open')+'">'+(c.resolved?'Resolved':'Open')+'</span><span class="when">'+ago(c.created_at)+'</span></span></div>'
          +'<div class="txt">'+esc(c.body)+'</div>'
          +(c.anchor&&c.anchor.tx?'<div class="where">on: “'+esc(c.anchor.tx.slice(0,80))+'”</div>':'')
          +repHtml+'</div></div>';
      });
    });
  });
  $('board').innerHTML=html;
}
function kpi(n,l){return '<div class="kpi"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
function exportCsv(){
  var rows=[['site','page','status','comment','element_text','author','created_at','type']];
  DATA.filter(function(c){return !SITE||c.project===SITE;}).forEach(function(c){rows.push([c.project,c.page,c.resolved?'resolved':'open',c.body,(c.anchor&&c.anchor.tx)||'',c.author,c.created_at,c.parent_id?'reply':'comment']);});
  if(rows.length<2){alert('Nothing to export yet.');return;}
  var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='idesign-site-review.csv';a.click();
}
load();
setInterval(load, 15000);
</script>
</body>
</html>
